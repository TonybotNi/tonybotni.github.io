<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450"
     font-family="-apple-system,'Segoe UI',Roboto,'PingFang SC','Microsoft YaHei',sans-serif">
  <rect x="2" y="2" width="796" height="446" rx="16" fill="#ffffff" stroke="#e5e7eb"/>
  <text x="400" y="44" font-size="22" font-weight="700" fill="#1f2937" text-anchor="middle">Async Rollout Routes</text>
  <text x="400" y="70" font-size="13" fill="#6b7280" text-anchor="middle">From simple synchronous loops to continuous RL systems</text>

  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#6b7280"/>
    </marker>
  </defs>

  <rect x="40" y="132" width="150" height="150" rx="14" fill="#eff6ff" stroke="#3b82f6"/>
  <text x="115" y="162" font-size="15" font-weight="700" fill="#1f2937" text-anchor="middle">Sync Colocate</text>
  <rect x="62" y="185" width="106" height="30" rx="8" fill="#ffffff" stroke="#bfdbfe"/>
  <text x="115" y="205" font-size="12" fill="#1f2937" text-anchor="middle">Generate</text>
  <rect x="62" y="226" width="106" height="30" rx="8" fill="#ffffff" stroke="#bfdbfe"/>
  <text x="115" y="246" font-size="12" fill="#1f2937" text-anchor="middle">Train</text>
  <text x="115" y="310" font-size="12" fill="#6b7280" text-anchor="middle">Easy debug</text>
  <text x="115" y="328" font-size="12" fill="#6b7280" text-anchor="middle">Barrier cost</text>

  <rect x="230" y="132" width="150" height="150" rx="14" fill="#f0fdf4" stroke="#10b981"/>
  <text x="305" y="162" font-size="15" font-weight="700" fill="#1f2937" text-anchor="middle">Disagg Pipeline</text>
  <rect x="252" y="185" width="106" height="30" rx="8" fill="#ffffff" stroke="#bbf7d0"/>
  <text x="305" y="205" font-size="12" fill="#1f2937" text-anchor="middle">Rollout GPUs</text>
  <rect x="252" y="226" width="106" height="30" rx="8" fill="#ffffff" stroke="#bbf7d0"/>
  <text x="305" y="246" font-size="12" fill="#1f2937" text-anchor="middle">Train GPUs</text>
  <text x="305" y="310" font-size="12" fill="#6b7280" text-anchor="middle">Tunable pools</text>
  <text x="305" y="328" font-size="12" fill="#6b7280" text-anchor="middle">Round boundary</text>

  <rect x="420" y="132" width="150" height="150" rx="14" fill="#faf5ff" stroke="#8b5cf6"/>
  <text x="495" y="162" font-size="15" font-weight="700" fill="#1f2937" text-anchor="middle">Bounded Async</text>
  <rect x="442" y="185" width="106" height="30" rx="8" fill="#ffffff" stroke="#ddd6fe"/>
  <text x="495" y="205" font-size="12" fill="#1f2937" text-anchor="middle">Overlap</text>
  <rect x="442" y="226" width="106" height="30" rx="8" fill="#ffffff" stroke="#ddd6fe"/>
  <text x="495" y="246" font-size="12" fill="#1f2937" text-anchor="middle">Freshness cap</text>
  <text x="495" y="310" font-size="12" fill="#6b7280" text-anchor="middle">Practical path</text>
  <text x="495" y="328" font-size="12" fill="#6b7280" text-anchor="middle">Needs checks</text>

  <rect x="610" y="132" width="150" height="150" rx="14" fill="#fff7ed" stroke="#f59e0b"/>
  <text x="685" y="162" font-size="15" font-weight="700" fill="#1f2937" text-anchor="middle">Continuous RL</text>
  <rect x="632" y="185" width="106" height="30" rx="8" fill="#ffffff" stroke="#fed7aa"/>
  <text x="685" y="205" font-size="12" fill="#1f2937" text-anchor="middle">Replay buffer</text>
  <rect x="632" y="226" width="106" height="30" rx="8" fill="#ffffff" stroke="#fed7aa"/>
  <text x="685" y="246" font-size="12" fill="#1f2937" text-anchor="middle">Controller</text>
  <text x="685" y="310" font-size="12" fill="#6b7280" text-anchor="middle">Highest upside</text>
  <text x="685" y="328" font-size="12" fill="#6b7280" text-anchor="middle">Most complex</text>

  <line x1="190" y1="207" x2="228" y2="207" stroke="#6b7280" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="380" y1="207" x2="418" y2="207" stroke="#6b7280" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="570" y1="207" x2="608" y2="207" stroke="#6b7280" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="120" y="366" width="560" height="34" rx="17" fill="#f9fafb" stroke="#e5e7eb"/>
  <text x="400" y="388" font-size="13" font-weight="600" fill="#1f2937" text-anchor="middle">The common standard is likely between route 3 and route 4.</text>
</svg>
