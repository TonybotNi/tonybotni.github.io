    <rect x="478" y="232" width="210" height="74" rx="10" fill="#ecfeff" stroke="#a5f3fc"/>
    <text x="583" y="256" fill="#0891b2" font-size="11" text-anchor="middle" font-weight="700">optimization target</text>
    <text x="583" y="278" fill="#1f2937" font-size="11" text-anchor="middle">TPOT ↓ · smooth streaming</text>
