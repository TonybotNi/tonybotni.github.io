    <line x1="360" y1="121" x2="400" y2="121" stroke="#f59e0b" stroke-width="1.4" marker-end="url(#a3o)"/>
    <circle cx="418" cy="121" r="4" fill="#64748b" opacity=".55"/>
    <circle cx="456" cy="121" r="4" fill="#64748b" opacity=".35"/>
