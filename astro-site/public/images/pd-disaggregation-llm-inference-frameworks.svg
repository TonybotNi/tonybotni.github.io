<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450" font-family="JetBrains Mono, ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace">
  <g transform="translate(20 35)">
    <text x="40" y="44" fill="#d97706" font-size="13" font-weight="700" letter-spacing="1">vLLM — prefill pushes KV</text>
    <rect x="40" y="64" width="150" height="52" rx="8" fill="#f9fafb" stroke="#d1d5db"/>
    <text x="115" y="86" fill="#1f2937" font-size="11.5" text-anchor="middle">Proxy</text>
    <text x="115" y="103" fill="#6b7280" font-size="10" text-anchor="middle">pick 1P1D pair</text>
    <rect x="270" y="64" width="150" height="52" rx="8" fill="#fff7ed" stroke="#f59e0b"/>
    <text x="345" y="86" fill="#d97706" font-size="11.5" text-anchor="middle" font-weight="700">Prefill instance</text>
    <text x="345" y="103" fill="#6b7280" font-size="10" text-anchor="middle">compute KV cache</text>
    <rect x="560" y="64" width="150" height="52" rx="8" fill="#ecfeff" stroke="#06b6d4"/>
    <text x="635" y="86" fill="#0891b2" font-size="11.5" text-anchor="middle" font-weight="700">Decode instance</text>
    <text x="635" y="103" fill="#6b7280" font-size="10" text-anchor="middle">generate tokens</text>
    <line x1="190" y1="90" x2="268" y2="90" stroke="#9ca3af" stroke-width="1.4" marker-end="url(#fa)"/>
    <line x1="420" y1="90" x2="558" y2="90" stroke="#f59e0b" stroke-width="1.6" marker-end="url(#fao)"/>
    <text x="489" y="82" fill="#d97706" font-size="10" text-anchor="middle">PUSH KV</text>
    <text x="489" y="106" fill="#6b7280" font-size="9" text-anchor="middle">RDMA</text>
    <line x1="40" y1="158" x2="710" y2="158" stroke="#e5e7eb"/>
    <text x="40" y="196" fill="#0891b2" font-size="13" font-weight="700" letter-spacing="1">SGLang — decode reserves memory first</text>
    <rect x="40" y="216" width="138" height="52" rx="8" fill="#f9fafb" stroke="#d1d5db"/>
    <text x="109" y="238" fill="#1f2937" font-size="11" text-anchor="middle">Proxy pairs</text>
    <text x="109" y="255" fill="#6b7280" font-size="9.5" text-anchor="middle">bootstrap_room</text>
    <rect x="210" y="216" width="138" height="52" rx="8" fill="#ecfeff" stroke="#06b6d4"/>
    <text x="279" y="234" fill="#0891b2" font-size="11" text-anchor="middle" font-weight="700">1. Decode</text>
    <text x="279" y="250" fill="#1f2937" font-size="10" text-anchor="middle">reserve KV memory</text>
    <text x="279" y="263" fill="#6b7280" font-size="9" text-anchor="middle">before compute</text>
    <rect x="380" y="216" width="138" height="52" rx="8" fill="#fff7ed" stroke="#f59e0b"/>
    <text x="449" y="238" fill="#d97706" font-size="11" text-anchor="middle" font-weight="700">2. Prefill</text>
    <text x="449" y="255" fill="#6b7280" font-size="10" text-anchor="middle">compute after signal</text>
    <rect x="572" y="216" width="138" height="52" rx="8" fill="#ecfeff" stroke="#06b6d4"/>
    <text x="641" y="238" fill="#0891b2" font-size="11" text-anchor="middle" font-weight="700">3. Decode</text>
    <text x="641" y="255" fill="#6b7280" font-size="10" text-anchor="middle">stream tokens</text>
    <line x1="178" y1="242" x2="208" y2="242" stroke="#9ca3af" stroke-width="1.4" marker-end="url(#fa)"/>
    <path d="M348 230 C364 222, 366 222, 378 230" fill="none" stroke="#06b6d4" stroke-width="1.5" marker-end="url(#fad)"/>
    <text x="363" y="212" fill="#0891b2" font-size="9" text-anchor="middle">signal</text>
    <line x1="518" y1="242" x2="570" y2="242" stroke="#f59e0b" stroke-width="1.6" marker-end="url(#fao)"/>
    <text x="544" y="234" fill="#d97706" font-size="9" text-anchor="middle">RDMA write</text>
    <text x="40" y="312" fill="#6b7280" font-size="10.5">Same split: vLLM uses connector PUSH; SGLang reserves decode memory before prefill.</text>
  </g>
  <defs>
    <marker id="fa" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#9ca3af"/></marker>
    <marker id="fao" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#f59e0b"/></marker>
    <marker id="fad" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#06b6d4"/></marker>
  </defs>
</svg>
