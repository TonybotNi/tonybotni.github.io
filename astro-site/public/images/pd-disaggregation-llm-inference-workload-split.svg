<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450" font-family="JetBrains Mono, ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace">
  <g transform="translate(20 45)">
    <line x1="380" y1="40" x2="380" y2="320" stroke="#e5e7eb" stroke-dasharray="4 6"/>

    <text x="40" y="38" fill="#d97706" font-size="13" font-weight="700" letter-spacing="1.5">PREFILL · COMPUTE-BOUND</text>
    <g>
      <rect x="40" y="70" width="44" height="30" rx="5" fill="#fff7ed" stroke="#f59e0b" stroke-width="1"/>
      <rect x="90" y="70" width="44" height="30" rx="5" fill="#fff7ed" stroke="#f59e0b" stroke-width="1"/>
      <rect x="140" y="70" width="44" height="30" rx="5" fill="#fff7ed" stroke="#f59e0b" stroke-width="1"/>
      <rect x="190" y="70" width="44" height="30" rx="5" fill="#fff7ed" stroke="#f59e0b" stroke-width="1"/>
      <rect x="240" y="70" width="44" height="30" rx="5" fill="#fff7ed" stroke="#f59e0b" stroke-width="1"/>
      <text x="162" y="118" fill="#6b7280" font-size="11" text-anchor="middle">prompt tokens</text>
    </g>
    <g stroke="#f59e0b" stroke-width="1.4" opacity=".9">
      <line x1="62" y1="128" x2="62" y2="158" marker-end="url(#arrP)"/>
      <line x1="112" y1="128" x2="112" y2="158" marker-end="url(#arrP)"/>
      <line x1="162" y1="128" x2="162" y2="158" marker-end="url(#arrP)"/>
      <line x1="212" y1="128" x2="212" y2="158" marker-end="url(#arrP)"/>
      <line x1="262" y1="128" x2="262" y2="158" marker-end="url(#arrP)"/>
    </g>
    <rect x="40" y="166" width="244" height="46" rx="8" fill="#fff7ed" stroke="#f59e0b" stroke-width="1.3"/>
    <text x="162" y="194" fill="#b45309" font-size="13" text-anchor="middle" font-weight="700">GPU · parallel matmul</text>
    <text x="40" y="246" fill="#6b7280" font-size="11">Compute utilization</text>
    <rect x="40" y="254" width="244" height="14" rx="7" fill="#f3f4f6"/>
    <rect x="40" y="254" width="226" height="14" rx="7" fill="#f59e0b"/>
    <text x="276" y="265" fill="#d97706" font-size="11" text-anchor="end" font-weight="700">near full</text>
    <text x="40" y="296" fill="#6b7280" font-size="11">HBM bandwidth</text>
    <rect x="40" y="304" width="244" height="14" rx="7" fill="#f3f4f6"/>
    <rect x="40" y="304" width="78" height="14" rx="7" fill="#fcd34d"/>
    <text x="276" y="315" fill="#6b7280" font-size="11" text-anchor="end">idle</text>

    <text x="420" y="38" fill="#0891b2" font-size="13" font-weight="700" letter-spacing="1.5">DECODE · MEMORY-BOUND</text>
    <text x="420" y="64" fill="#6b7280" font-size="11">KV cache grows over time</text>
    <g>
      <rect x="420" y="72" width="150" height="13" rx="3" fill="#ecfeff" stroke="#06b6d4" stroke-width=".8"/>
      <rect x="420" y="88" width="150" height="13" rx="3" fill="#ecfeff" stroke="#06b6d4" stroke-width=".8"/>
      <rect x="420" y="104" width="150" height="13" rx="3" fill="#ecfeff" stroke="#06b6d4" stroke-width=".8"/>
      <rect x="420" y="120" width="150" height="13" rx="3" fill="#ecfeff" stroke="#06b6d4" stroke-width=".8"/>
    </g>
    <path d="M576 102 C 612 102, 612 150, 648 150" fill="none" stroke="#06b6d4" stroke-width="1.4" marker-end="url(#arrD)" opacity=".9"/>
    <text x="600" y="96" fill="#0891b2" font-size="10">read all</text>
    <rect x="648" y="136" width="56" height="30" rx="5" fill="#ecfeff" stroke="#06b6d4" stroke-width="1.2"/>
    <text x="676" y="156" fill="#0891b2" font-size="11" text-anchor="middle" font-weight="700">+1 tok</text>
    <text x="648" y="186" fill="#6b7280" font-size="10">one token per step</text>

    <text x="420" y="246" fill="#6b7280" font-size="11">Compute utilization</text>
    <rect x="420" y="254" width="244" height="14" rx="7" fill="#f3f4f6"/>
    <rect x="420" y="254" width="70" height="14" rx="7" fill="#67e8f9"/>
    <text x="704" y="265" fill="#6b7280" font-size="11" text-anchor="end">mostly idle</text>
    <text x="420" y="296" fill="#6b7280" font-size="11">HBM bandwidth</text>
    <rect x="420" y="304" width="244" height="14" rx="7" fill="#f3f4f6"/>
    <rect x="420" y="304" width="232" height="14" rx="7" fill="#06b6d4"/>
    <text x="704" y="315" fill="#0891b2" font-size="11" text-anchor="end" font-weight="700">near full</text>
  </g>
  <defs>
    <marker id="arrP" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#f59e0b"/></marker>
    <marker id="arrD" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#06b6d4"/></marker>
  </defs>
</svg>
