<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450" font-family="JetBrains Mono, ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace">
  <g transform="translate(20 35)">
    <line x1="90" y1="310" x2="710" y2="310" stroke="#9ca3af" stroke-width="1"/>
    <line x1="90" y1="310" x2="90" y2="55" stroke="#9ca3af" stroke-width="1"/>
    <text x="400" y="350" fill="#6b7280" font-size="12" text-anchor="middle">arithmetic intensity (FLOP/byte) →</text>
    <text x="64" y="180" fill="#6b7280" font-size="12" text-anchor="middle" transform="rotate(-90 64 180)">achievable throughput →</text>
    <line x1="90" y1="310" x2="430" y2="95" stroke="#06b6d4" stroke-width="2"/>
    <text x="150" y="250" fill="#0891b2" font-size="11" transform="rotate(-32 150 250)">HBM bandwidth slope</text>
    <line x1="430" y1="95" x2="710" y2="95" stroke="#f59e0b" stroke-width="2"/>
    <text x="560" y="86" fill="#d97706" font-size="11" text-anchor="middle">compute roof</text>
    <line x1="430" y1="95" x2="430" y2="310" stroke="#d1d5db" stroke-dasharray="3 4"/>
    <circle cx="430" cy="95" r="3.5" fill="#1f2937"/>
    <text x="430" y="332" fill="#6b7280" font-size="10.5" text-anchor="middle">ridge ≈ 295 (H100)</text>
    <circle cx="158" cy="259" r="7" fill="#06b6d4"/>
    <circle cx="158" cy="259" r="13" fill="none" stroke="#06b6d4" stroke-width="1" opacity=".4"/>
    <text x="172" y="252" fill="#0891b2" font-size="12" font-weight="700">DECODE</text>
    <text x="172" y="269" fill="#6b7280" font-size="10.5">≈ 1 FLOP/byte · bandwidth-bound</text>
    <line x1="158" y1="310" x2="158" y2="272" stroke="#06b6d4" stroke-dasharray="2 3" opacity=".5"/>
    <circle cx="585" cy="95" r="7" fill="#f59e0b"/>
    <circle cx="585" cy="95" r="13" fill="none" stroke="#f59e0b" stroke-width="1" opacity=".4"/>
    <text x="585" y="128" fill="#d97706" font-size="12" font-weight="700" text-anchor="middle">PREFILL</text>
    <text x="585" y="144" fill="#6b7280" font-size="10.5" text-anchor="middle">high intensity · compute-bound</text>
    <text x="90" y="44" fill="#6b7280" font-size="11">same GPU, two phases in different roofline regions</text>
  </g>
</svg>
