<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450" font-family="JetBrains Mono, ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace">
  <g transform="translate(20 75)">
    <line x1="60" y1="250" x2="720" y2="250" stroke="#d1d5db" stroke-width="1"/>
    <text x="720" y="272" fill="#6b7280" font-size="11" text-anchor="end">time →</text>
    <text x="60" y="38" fill="#1f2937" font-size="13" font-weight="700">single-GPU timeline: one decode stream</text>
    <g fill="#06b6d4">
      <rect x="74" y="200" width="10" height="50" rx="2"/>
      <rect x="114" y="200" width="10" height="50" rx="2"/>
      <rect x="154" y="200" width="10" height="50" rx="2"/>
      <rect x="194" y="200" width="10" height="50" rx="2"/>
    </g>
    <text x="74" y="190" fill="#0891b2" font-size="10">stable ITL</text>
    <g stroke="#06b6d4" stroke-width="1" opacity=".45">
      <line x1="84" y1="262" x2="114" y2="262"/>
      <line x1="124" y1="262" x2="154" y2="262"/>
      <line x1="164" y1="262" x2="194" y2="262"/>
    </g>
    <rect x="234" y="120" width="190" height="130" rx="6" fill="#fff7ed" stroke="#f59e0b" stroke-width="1.3"/>
    <text x="329" y="100" fill="#d97706" font-size="12" text-anchor="middle" font-weight="700">new long PREFILL joins</text>
    <text x="329" y="190" fill="#b45309" font-size="11" text-anchor="middle">compute occupied</text>
    <text x="329" y="208" fill="#b45309" font-size="11" text-anchor="middle">hundreds of ms</text>
    <g stroke="#ef4444" stroke-width="1.3" stroke-dasharray="3 4">
      <line x1="204" y1="262" x2="234" y2="262"/>
    </g>
    <g fill="#06b6d4">
      <rect x="434" y="200" width="10" height="50" rx="2"/>
      <rect x="474" y="200" width="10" height="50" rx="2"/>
      <rect x="514" y="200" width="10" height="50" rx="2"/>
    </g>
    <path d="M204 158 L434 158" stroke="#ef4444" stroke-width="1.2" marker-start="url(#tick)" marker-end="url(#tick)"/>
    <text x="319" y="150" fill="#ef4444" font-size="11.5" text-anchor="middle" font-weight="700">ITL spike: user sees a pause</text>
  </g>
  <defs>
    <marker id="tick" markerWidth="6" markerHeight="10" refX="3" refY="5" orient="auto"><line x1="3" y1="0" x2="3" y2="10" stroke="#ef4444" stroke-width="1.4"/></marker>
  </defs>
</svg>
